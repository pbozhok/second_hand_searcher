<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/search-animation.css">
</head>
<body>
    <div class="search-container" id="search-container">
        <div class="search-box">
            <h1>Scour</h1>
            <p class="tagline">All the listings. None of the junk.</p>

            <form id="search-form">
                <div class="search-input-group">
                    <input
                        type="text"
                        name="query"
                        id="search-query"
                        placeholder="Search for items..."
                        required
                        minlength="1"
                        maxlength="500"
                        autocomplete="off"
                    >
                    <button type="submit" class="search-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        Search
                    </button>
                </div>

                <input type="hidden" name="use_filter"  value="true" id="toggle-filter">
                <input type="hidden" name="use_reviews" value="true" id="toggle-reviews">
                <input type="hidden" name="use_scoring" value="true" id="toggle-scoring">
                <input type="hidden" name="sort_by"     value="score" id="sort-selector">
                <input type="hidden" name="max_results" value="40">
                <input type="hidden" name="currency"    value="EUR">
            </form>

            <div class="toggle-controls">
                <label class="toggle-item">
                    <input type="checkbox" checked onchange="updateToggle('filter', this.checked)">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Filtering</span>
                </label>
                <label class="toggle-item">
                    <input type="checkbox" checked onchange="updateToggle('reviews', this.checked)">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Reviews</span>
                </label>
                <label class="toggle-item">
                    <input type="checkbox" checked onchange="updateToggle('scoring', this.checked)">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Scoring</span>
                </label>
            </div>

            <div class="sort-controls">
                <span class="sort-label">sort:</span>
                <button class="sort-button active" data-sort="score"      onclick="setSortAndSearch('score')">Score</button>
                <button class="sort-button"         data-sort="price_asc"  onclick="setSortAndSearch('price_asc')">Price ↑</button>
                <button class="sort-button"         data-sort="price_desc" onclick="setSortAndSearch('price_desc')">Price ↓</button>
                <button class="sort-button"         data-sort="date"       onclick="setSortAndSearch('date')">Date</button>
            </div>

            <button id="config-btn" class="config-btn" title="Settings" aria-label="Open settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="config-modal" class="config-modal-overlay" role="dialog" aria-modal="true" aria-label="Settings">
        <div class="config-modal">
            <div class="config-modal-header">
                <div class="config-modal-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    Settings
                </div>
                <button id="config-modal-close" class="config-modal-close" aria-label="Close settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div id="config-modal-body" class="config-modal-body"></div>

            <div class="config-modal-footer">
                <button id="config-reset-btn" class="config-btn-reset">Reset to defaults</button>
                <div class="config-footer-right">
                    <button id="config-save-btn" class="config-btn-save">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="search-animation" class="search-animation-container" style="display: none;"></div>
    <div id="error-message"    class="error-message"             style="display: none;"></div>
    <div id="results-container" class="results-container"></div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/search-animation.js"></script>
    <script src="/static/js/search-animation-integration.js"></script>
    <script src="/static/js/config.js"></script>
</body>
</html>
