<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second-Hand Search</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- Search Container - starts in center, moves to top on search -->
    <div class="search-container" id="search-container">
        <div class="search-box">
            <h1>Second-Hand Search</h1>
            <form id="search-form">
                <div class="search-input-group">
                    <input 
                        type="text" 
                        name="query" 
                        id="search-query"
                        placeholder="Search for items..."
                        required
                        minlength="1"
                        maxlength="500"
                        autocomplete="off"
                    >
                    <button type="submit" class="search-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        Smart Search
                    </button>
                </div>
                
                <!-- Hidden fields for toggles and sorting -->
                <input type="hidden" name="use_filter" value="true" id="toggle-filter">
                <input type="hidden" name="use_reviews" value="true" id="toggle-reviews">
                <input type="hidden" name="use_scoring" value="true" id="toggle-scoring">
                <input type="hidden" name="sort_by" value="score" id="sort-selector">
                <input type="hidden" name="max_results" value="40">
                <input type="hidden" name="currency" value="EUR">
            </form>
            
            <!-- Toggle Controls -->
            <div class="toggle-controls">
                <label class="toggle-item">
                    <input type="checkbox" checked onchange="updateToggle('filter', this.checked)">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Filtering</span>
                </label>
                <label class="toggle-item">
                    <input type="checkbox" checked onchange="updateToggle('reviews', this.checked)">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Reviews</span>
                </label>
                <label class="toggle-item">
                    <input type="checkbox" checked onchange="updateToggle('scoring', this.checked)">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Scoring</span>
                </label>
            </div>
            
            <!-- Sort Controls -->
            <div class="sort-controls">
                <span class="sort-label">Sort by:</span>
                <button class="sort-button active" data-sort="score" onclick="setSortAndSearch('score')">Score</button>
                <button class="sort-button" data-sort="price_asc" onclick="setSortAndSearch('price_asc')">Price (Low)</button>
                <button class="sort-button" data-sort="price_desc" onclick="setSortAndSearch('price_desc')">Price (High)</button>
                <button class="sort-button" data-sort="date" onclick="setSortAndSearch('date')">Date</button>
            </div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading-indicator" class="loading-indicator" style="display: none;">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="error-message" style="display: none;"></div>

    <!-- Results Container -->
    <div id="results-container" class="results-container"></div>

    <!-- Main App Script -->
    <script src="/static/js/app.js"></script>
</body>
</html>
